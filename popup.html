<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      padding: 16px;
      margin: 0;
      color: #172b4d;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #5e6c84;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #dfe1e6;
      border-radius: 4px;
      outline: none;
    }
    input:focus {
      border-color: #0052cc;
    }
    .hint {
      font-size: 11px;
      color: #7a869a;
      margin: 4px 0 12px;
    }
    button {
      width: 100%;
      padding: 7px;
      font-size: 13px;
      font-weight: 500;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #0065ff; }
    #status {
      font-size: 12px;
      color: #006644;
      margin-top: 8px;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>Jira Quick Copy — Settings</h2>
  <label for="jiraBase">Jira base URL</label>
  <input id="jiraBase" type="text" placeholder="yourcompany.atlassian.net" />
  <p class="hint">Used to build Jira links from Bitbucket PR titles.</p>
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
